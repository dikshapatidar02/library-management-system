{% extends "base.html" %}
{% block title %}Page Not Found — Bookmark{% endblock %}
{% block content %}
<div class="page-wrapper">
  <div class="empty-state" style="padding:6rem 2rem;">
    <div class="empty-state-icon">404</div>
    <h3 style="font-size:1.6rem;">Page Not Found</h3>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Go to Dashboard</a>
  </div>
</div>
{% endblock %}
