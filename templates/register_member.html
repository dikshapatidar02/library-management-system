{% extends "base.html" %}
{% block title %}Register Member — Bookmark{% endblock %}

{% block content %}
<div class="page-wrapper">

  <div class="page-header">
    <h1>Register Member</h1>
    <p>Add a new library member to the system.</p>
  </div>

  <div class="card form-card">
    <div class="card-header">
      <h2>👤 Member Details</h2>
    </div>
    <div class="card-body">
      <form method="POST" action="{{ url_for('register_member') }}">
        <div class="form-grid">

          <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" required
                   value="{{ form_name or '' }}"
                   placeholder="e.g. Aarav Sharma">
          </div>

          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required
                   value="{{ form_email or '' }}"
                   placeholder="e.g. aarav@example.com">
            <span class="form-hint">Must be unique. Used as the member identifier.</span>
          </div>

          <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.5rem;">
            <button type="submit" class="btn btn-success">➕ Register</button>
            <a href="{{ url_for('view_members') }}" class="btn btn-secondary">Cancel</a>
          </div>

        </div>
      </form>
    </div>
  </div>

</div>
{% endblock %}
